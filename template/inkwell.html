<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-bg: #0F0F12;
    --ink-surface: #1A1A1F;
    --ink-raised: #242429;
    --ink-border: #2E2E35;
    --ink-text: #E8E8F0;
    --ink-muted: #8888A0;
    --ink-violet: #8B6FE8;
    --ink-paper: #F5EDD9;
    --ink-bookink: #2C2416;
    --shelf-wood: #1e1a14;
    --shelf-wood-light: #2a241c;
    --table-dark: #161410;
    --table-light: #1e1912;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--ink-bg); color: var(--ink-text); overflow: hidden; }

  .app { display: flex; height: 100vh; width: 100vw; }

  /* LEFT PANEL */
  .left-panel {
    width: 300px; flex: none;
    border-right: 1px solid var(--ink-border);
    background: var(--ink-surface);
    display: flex; flex-direction: column;
  }
  .wordmark {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 22px;
    border-bottom: 1px solid var(--ink-border);
  }
  .wordmark-glyph { color: var(--ink-violet); font-size: 14px; }
  .wordmark-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--ink-text);
  }

  /* CHALLENGE CARD */
  .challenge-card {
    margin: 14px;
    border-radius: 10px;
    border: 1px solid rgba(139,111,232,0.35);
    background: linear-gradient(145deg, var(--ink-raised), #1e1e24);
    padding: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 12px rgba(139,111,232,0.08);
  }
  .challenge-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .challenge-label {
    font-size: 10px; font-weight: 600;
    color: var(--ink-violet); text-transform: uppercase; letter-spacing: 0.2em;
  }
  .challenge-streak {
    display: flex; align-items: center; gap: 4px;
    font-family: 'Inter', monospace; font-size: 13px; color: var(--ink-text);
  }
  .challenge-prompt {
    font-size: 13.5px; line-height: 1.65; color: var(--ink-text);
    margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .challenge-btn {
    width: 100%; border-radius: 8px;
    padding: 8px 0; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .challenge-btn.primary {
    background: linear-gradient(135deg, var(--ink-violet), #6b52c7);
    color: white; box-shadow: 0 2px 8px rgba(139,111,232,0.3);
  }
  .challenge-btn.primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(139,111,232,0.45);
  }
  .challenge-btn.secondary {
    background: transparent; color: var(--ink-violet);
    border: 1px solid rgba(139,111,232,0.5);
  }
  .challenge-btn.secondary:hover {
    background: rgba(139,111,232,0.1);
    border-color: var(--ink-violet);
  }

  /* BOOKSHELF */
  .bookshelf-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 14px 14px;
  }
  .shelf-row {
    position: relative;
    padding: 20px 8px 32px;
    margin-bottom: 6px;
    display: flex;
    justify-content: center;
    gap: 2px;
  }
  .shelf-row::after {
    content: '';
    position: absolute;
    bottom: 0; left: -14px; right: -14px;
    height: 16px;
    background: linear-gradient(180deg, var(--shelf-wood-light), var(--shelf-wood));
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(0,0,0,0.4);
    box-shadow: 0 6px 14px rgba(0,0,0,0.5);
    border-radius: 0 0 2px 2px;
  }
  .shelf-row::before {
    content: '';
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    height: 10px;
    background: linear-gradient(180deg, rgba(0,0,0,0.3), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* VERTICAL SPINE BOOK */
  .spine-book {
    position: relative;
    width: 36px;
    height: 170px;
    cursor: pointer;
    perspective: 800px;
    z-index: 1;
    flex-shrink: 0;
  }
  .spine-book.selected {
    z-index: 5;
  }
  .spine-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: left center;
    border-radius: 2px 3px 3px 2px;
    box-shadow: -2px 3px 8px rgba(0,0,0,0.5);
  }
  .spine-book:hover .spine-inner,
  .spine-book.selected .spine-inner {
    transform: rotateY(-75deg);
    box-shadow: -8px 8px 24px rgba(0,0,0,0.6);
  }
  .spine-face {
    position: absolute;
    inset: 0;
    border-radius: 2px 3px 3px 2px;
    overflow: hidden;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spine-face.front {
    background: linear-gradient(90deg, #2a2520, #1e1a15);
    z-index: 2;
    box-shadow: inset -2px 0 4px rgba(0,0,0,0.4), inset 1px 0 0 rgba(255,255,255,0.04);
  }
  .spine-face.front::before {
    content: '';
    position: absolute;
    left: 2px; top: 8px; bottom: 8px; width: 1px;
    background: rgba(255,255,255,0.06);
  }
  .spine-face.front::after {
    content: '';
    position: absolute;
    right: 3px; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.3));
  }
  .spine-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 13px;
    color: #c9b896;
    letter-spacing: 0.08em;
    max-height: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    padding: 8px 0;
  }
  .spine-ornament {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px;
    border: 1px solid rgba(201,184,150,0.3);
    border-radius: 50%;
  }
  .spine-ornament.bottom {
    top: auto; bottom: 12px;
  }
  .spine-face.back {
    transform: rotateY(180deg);
    z-index: 1;
  }
  .spine-face.back img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .spine-book.selected .spine-face.front {
    box-shadow: inset 0 0 0 1px rgba(139,111,232,0.5);
  }

  .new-story-btn {
    margin: 14px; margin-top: 4px;
    width: calc(100% - 28px);
    border-radius: 8px; border: 1px dashed var(--ink-border);
    padding: 12px 0; font-size: 13px; color: var(--ink-muted);
    background: transparent; cursor: pointer; transition: all 0.2s;
  }
  .new-story-btn:hover {
    color: var(--ink-text);
    border-color: rgba(139,111,232,0.4);
    background: rgba(139,111,232,0.04);
  }

  /* MAIN STAGE */
  .main-stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #141418 0%, var(--ink-bg) 70%);
    position: relative;
    perspective: 1200px;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    color: var(--ink-muted);
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .empty-book {
    width: 80px; height: 110px;
    border: 2px dashed var(--ink-border); border-radius: 4px;
    opacity: 0.25;
    position: relative;
  }
  .empty-book::after {
    content: '';
    position: absolute;
    left: 6px; top: 0; bottom: 0; width: 2px;
    border-left: 1px dashed var(--ink-border);
    opacity: 0.5;
  }
  .empty-state p { font-size: 14px; letter-spacing: 0.02em; }

  /* TABLE SURFACE */
  .table-scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeIn 0.5s ease;
    transform-style: preserve-3d;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-on-table {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .book-spread {
    display: flex;
    width: 720px; height: 500px;
    border-radius: 4px 6px 6px 4px;
    overflow: hidden;
    background: var(--ink-paper);
    position: relative;
    box-shadow:
      0 4px 0 0 #d4c9a8,
      0 6px 0 0 #b8aa82,
      0 8px 0 0 #9e8f68,
      0 30px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(0,0,0,0.2);
    transform: rotateX(4deg);
    transform-origin: center bottom;
    transform-style: preserve-3d;
  }
  .book-spread::before {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0; width: 40px;
    transform: translateX(-50%);
    background: linear-gradient(90deg,
      rgba(0,0,0,0.06),
      rgba(0,0,0,0.16) 40%,
      rgba(0,0,0,0.16) 60%,
      rgba(0,0,0,0.06));
    pointer-events: none;
    z-index: 3;
  }
  .book-page {
    width: 50%; height: 100%; overflow: hidden;
    background: var(--ink-paper);
    padding: 40px 36px;
    display: flex; flex-direction: column;
    position: relative;
  }
  .book-page.left {
    border-right: 1px solid rgba(44,36,22,0.08);
    justify-content: center; align-items: center; text-align: center; gap: 18px;
  }
  .book-page.right {
    position: relative;
  }
  .page-genre-tag {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    background: rgba(44,36,22,0.07); color: var(--ink-bookink);
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .page-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px; color: var(--ink-bookink); line-height: 1.25;
    max-width: 220px;
  }
  .page-date {
    font-size: 11px; color: rgba(44,36,22,0.45); margin-top: 4px;
    font-style: italic;
  }
  .page-content {
    font-family: 'Lora', Georgia, serif;
    font-size: 14.5px; line-height: 1.8; color: var(--ink-bookink);
    white-space: pre-wrap;
  }

  /* PAGE FLIP */
  .page-flip-zone {
    position: absolute; top: 0; bottom: 0; width: 50px;
    background: transparent; border: none; cursor: pointer; z-index: 5;
    opacity: 0; transition: opacity 0.2s;
  }
  .page-flip-zone:hover {
    opacity: 0.06;
    background: linear-gradient(90deg, var(--ink-violet), transparent);
  }
  .page-flip-zone.prev {
    left: 0;
    background: linear-gradient(90deg, var(--ink-violet), transparent);
  }
  .page-flip-zone.next {
    right: 0;
    background: linear-gradient(270deg, var(--ink-violet), transparent);
  }
  .page-flip-zone:disabled { cursor: default; opacity: 0 !important; }

  .book-toolbar {
    display: flex; align-items: center; gap: 28px;
    color: var(--ink-muted);
    background: rgba(26,26,31,0.6);
    padding: 10px 24px;
    border-radius: 999px;
    border: 1px solid var(--ink-border);
    backdrop-filter: blur(8px);
    margin-top: 24px;
  }
  .book-toolbar button {
    background: none; border: none; color: inherit;
    font-size: 12px; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.15s;
    padding: 4px 8px; border-radius: 4px;
  }
  .book-toolbar button:hover {
    color: var(--ink-text);
    background: rgba(139,111,232,0.1);
  }
  .page-counter {
    font-family: 'Inter', monospace; font-size: 12px;
    color: var(--ink-muted);
  }

  /* TABLE SURFACE BENEATH */
  .table-surface {
    width: 900px; height: 40px;
    background: linear-gradient(180deg, var(--table-light), var(--table-dark));
    border-radius: 50%;
    margin-top: -10px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    position: relative;
    z-index: -1;
    opacity: 0.8;
  }

  /* SWITCH ANIMATION */
  .book-switch-out {
    animation: bookOut 0.35s ease-in forwards;
  }
  .book-switch-in {
    animation: bookIn 0.45s ease-out forwards;
  }
  @keyframes bookOut {
    from { opacity: 1; transform: rotateX(4deg) translateY(0) scale(1); }
    to { opacity: 0; transform: rotateX(8deg) translateY(30px) scale(0.92); }
  }
  @keyframes bookIn {
    from { opacity: 0; transform: rotateX(10deg) translateY(40px) scale(0.9); }
    to { opacity: 1; transform: rotateX(4deg) translateY(0) scale(1); }
  }

  /* OVERLAY */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,12,0.92);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    backdrop-filter: blur(4px);
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .overlay-card {
    width: 100%; max-width: 440px;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--ink-surface), #18181d);
    border: 1px solid var(--ink-border);
    padding: 36px;
    display: flex; flex-direction: column; gap: 22px;
    transform: scale(0.92) translateY(10px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  .overlay.open .overlay-card {
    transform: scale(1) translateY(0);
  }
  .overlay-header {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .overlay-header p { font-size: 14px; color: var(--ink-muted); }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 11px; font-weight: 600; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .form-group input {
    width: 100%; border-radius: 8px;
    border: 1px solid var(--ink-border);
    background: var(--ink-bg);
    padding: 11px 14px;
    font-size: 14px; color: var(--ink-text);
    outline: none; transition: all 0.2s;
  }
  .form-group input:focus {
    border-color: var(--ink-violet);
    box-shadow: 0 0 0 3px rgba(139,111,232,0.1);
  }
  .form-group input::placeholder { color: #55556b; }

  .generate-btn {
    width: 100%; border-radius: 8px;
    background: linear-gradient(135deg, var(--ink-violet), #6b52c7);
    color: white;
    border: none; padding: 13px 0;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 14px rgba(139,111,232,0.25);
    margin-top: 4px;
  }
  .generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(139,111,232,0.4);
  }
  .generate-btn:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
  }

  @keyframes ink-ripple {
    0% { transform: scale(0); opacity: 0.7; }
    100% { transform: scale(4); opacity: 0; }
  }
  .ink-loader {
    position: relative; display: inline-block; width: 16px; height: 16px;
  }
  .ink-loader::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: white; opacity: 0.75;
    animation: ink-ripple 1.2s ease-out infinite;
  }
  .ink-loader::after {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: white; opacity: 0.5;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-border); border-radius: 3px; }

  /* Decorative background glow on main stage */
  .main-stage::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,111,232,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL -->
  <aside class="left-panel">
    <div class="wordmark">
      <span class="wordmark-glyph">◆</span>
      <span class="wordmark-text">Inkwell</span>
    </div>

    <div class="challenge-card" id="challengeCard">
      <div class="challenge-header">
        <span class="challenge-label">Daily Challenge</span>
        <span class="challenge-streak">🔥 <span id="streakCount">12</span></span>
      </div>
      <p class="challenge-prompt" id="challengePrompt">Write about a clock that counts down to something other than time.</p>
      <button class="challenge-btn primary" id="challengeBtn" onclick="acceptChallenge()">Accept Challenge</button>
    </div>

    <div class="bookshelf-scroll" id="bookshelfScroll">
      <div id="shelvesContainer"></div>
    </div>

    <button class="new-story-btn" onclick="openOverlay()">+ New Story</button>
  </aside>

  <!-- MAIN STAGE -->
  <main class="main-stage" id="mainStage">
    <div class="empty-state" id="emptyState">
      <div class="empty-book"></div>
      <p>Select a story from your shelf</p>
    </div>

    <div class="table-scene" id="tableScene" style="display:none;">
      <div class="book-on-table" id="bookOnTable">
        <div class="book-spread" id="bookSpread">
          <div class="book-page left">
            <span class="page-genre-tag" id="bookGenre">Fantasy</span>
            <h1 class="page-title" id="bookTitle">The Clockmaker's Daughter</h1>
            <p class="page-date" id="bookDate">May 4, 2026</p>
          </div>
          <div class="book-page right" id="rightPage">
            <p class="page-content" id="pageContent"></p>
            <button class="page-flip-zone prev" id="prevBtn" onclick="flipBack()"></button>
            <button class="page-flip-zone next" id="nextBtn" onclick="flipForward()"></button>
          </div>
        </div>
      </div>
      <div class="table-surface"></div>
      <div class="book-toolbar">
        <span class="page-counter"><span id="currentPage">1</span> / <span id="totalPages">5</span></span>
        <button onclick="exportPdf()">PDF ↓</button>
        <button onclick="shareBook()">Share ↗</button>
      </div>
    </div>
  </main>
</div>

<!-- GENERATION OVERLAY -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="overlay-card" onclick="event.stopPropagation()">
    <div class="overlay-header">
      <div class="wordmark" style="border:none;padding:0;">
        <span class="wordmark-glyph">◆</span>
        <span class="wordmark-text">Inkwell</span>
      </div>
      <p>What will you write today?</p>
    </div>
    <form onsubmit="submitGeneration(event)">
      <div class="form-group">
        <label for="genre">Genre</label>
        <input id="genre" placeholder="Fantasy, Sci-Fi, Horror…" required>
      </div>
      <div class="form-group">
        <label for="characters">Characters</label>
        <input id="characters" placeholder="A reluctant mage, her mentor…" required>
      </div>
      <div class="form-group">
        <label for="setting">Setting</label>
        <input id="setting" placeholder="A collapsing empire at war…" required>
      </div>
      <button type="submit" class="generate-btn" id="generateBtn">
        Generate
      </button>
    </form>
  </div>
</div>

<script>
// ===================== SVG COVER GENERATORS =====================
function encodeSvg(svg) {
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

const COVERS = {
  clockmaker: encodeSvg(`<svg xmlns="http://www.w3.org/2000/svg" width="280" height="420" viewBox="0 0 280 420">
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0" stop-color="#1a1025"/><stop offset="0.5" stop-color="#0f0f12"/><stop offset="1" stop-color="#1e1b2e"/>
      </linearGradient>
      <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
        <stop offset="0" stop-color="#8B6FE8" stop-opacity="0.15"/>
        <stop offset="1" stop-color="transparent"/>
      </radialGradient>
    </defs>
    <rect width="280" height="420" fill="url(#g1)"/>
    <rect width="280" height="420" fill="url(#glow1)"/>
    <circle cx="140" cy="190" r="90" stroke="#8B6FE8" stroke-width="1.2" fill="none" opacity="0.25"/>
    <circle cx="140" cy="190" r="72" stroke="#8B6FE8" stroke-width="0.8" fill="none" opacity="0.18"/>
    <circle cx="140" cy="190" r="55" stroke="#8B6FE8" stroke-width="0.5" fill="none" opacity="0.12"/>
    <line x1="140" y1="115" x2="140" y2="135" stroke="#8B6FE8" stroke-width="2" opacity="0.5"/>
    <line x1="140" y1="245" x2="140" y2="265" stroke="#8B6FE8" stroke-width="2" opacity="0.5"/>
    <line x1="65" y1="190" x2="85" y2="190" stroke="#8B6FE8" stroke-width="2" opacity="0.5"/>

let books = [...PREBUILT_BOOKS];
let selectedBookId = null;
let currentPage = 0;

let isSwitching = false;

// ===================== RENDER =====================
function renderBookshelf() {
  const container = document.getElementById('shelvesContainer');
  const perShelf = 4;
  let html = '';

  for (let i = 0; i < books.length; i += perShelf) {
    const rowBooks = books.slice(i, i + perShelf);
    html += '<div class="shelf-row">';
    rowBooks.forEach(book => {
      const isSelected = selectedBookId === book.id;
      const colors = SPINE_COLORS[book.id] || SPINE_COLORS['prebuilt-1'];
      html += `
        <div class="spine-book ${isSelected ? 'selected' : ''}" onclick="selectBook('${book.id}')">
          <div class="spine-inner">
            <div class="spine-face front" style="background: linear-gradient(90deg, ${colors.bg}, ${adjustColor(colors.bg, -10)});">
              <div class="spine-ornament" style="border-color: ${colors.accent}40;"></div>
              <span class="spine-title" style="color: ${colors.title};">${book.shortTitle}</span>
              <div class="spine-ornament bottom" style="border-color: ${colors.accent}40;"></div>
            </div>
            <div class="spine-face back">
              <img src="${book.coverImageUrl}" alt="${book.title} cover">
            </div>
          </div>
        </div>
      `;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amount));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
  const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function selectBook(id) {
  if (isSwitching || id === selectedBookId) return;
  isSwitching = true;

  const bookOnTable = document.getElementById('bookOnTable');

  // Animate out
  if (selectedBookId && bookOnTable.style.display !== 'none') {
    bookOnTable.classList.add('book-switch-out');
    bookOnTable.classList.remove('book-switch-in');

    setTimeout(() => {
      selectedBookId = id;
      currentPage = 0;
      renderBookshelf();
      renderBook(true);
      isSwitching = false;
    }, 350);
  } else {
    selectedBookId = id;
    currentPage = 0;
    renderBookshelf();
    renderBook(true);
    isSwitching = false;
  }
}

function renderBook(animateIn = false) {
  const book = books.find(b => b.id === selectedBookId);
  const emptyState = document.getElementById('emptyState');
  const tableScene = document.getElementById('tableScene');
  const bookOnTable = document.getElementById('bookOnTable');

  if (!book) {
    emptyState.style.display = 'flex';
    tableScene.style.display = 'none';
    document.title = 'Inkwell';
    return;
  }

  emptyState.style.display = 'none';
  tableScene.style.display = 'flex';

  document.getElementById('bookGenre').textContent = book.genre;
  document.getElementById('bookTitle').textContent = book.title;
  document.getElementById('bookDate').textContent = new Date(book.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('pageContent').textContent = book.pages[currentPage];
  document.getElementById('currentPage').textContent = currentPage + 1;
  document.getElementById('totalPages').textContent = book.pages.length;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= book.pages.length - 1;
  document.title = `Inkwell — ${book.title}`;

  if (animateIn) {
    bookOnTable.classList.remove('book-switch-out');
    bookOnTable.classList.add('book-switch-in');
    setTimeout(() => {
      bookOnTable.classList.remove('book-switch-in');
    }, 450);
  }
}

function flipForward() {
  const book = books.find(b => b.id === selectedBookId);
  if (!book || currentPage >= book.pages.length - 1) return;
  currentPage++;
  animatePageFlip();
}

function flipBack() {
  if (currentPage <= 0) return;
  currentPage--;
  animatePageFlip();
}

function animatePageFlip() {
  const rightPage = document.getElementById('rightPage');
  const content = document.getElementById('pageContent');
  rightPage.style.transition = 'transform 180ms ease-in, opacity 120ms ease-in';
  rightPage.style.transformOrigin = 'left center';
  rightPage.style.transform = 'rotateY(-85deg)';
  rightPage.style.opacity = '0.4';

  setTimeout(() => {
    const book = books.find(b => b.id === selectedBookId);
    content.textContent = book.pages[currentPage];
    document.getElementById('currentPage').textContent = currentPage + 1;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= book.pages.length - 1;

    rightPage.style.transition = 'none';
    rightPage.style.transform = 'rotateY(85deg)';
    setTimeout(() => {
      rightPage.style.transition = 'transform 220ms ease-out, opacity 150ms ease-out';
      rightPage.style.transform = 'rotateY(0deg)';
      rightPage.style.opacity = '1';
    }, 40);
  }, 180);
}

function acceptChallenge() {
  challengeAccepted = true;
  const btn = document.getElementById('challengeBtn');
  btn.textContent = 'Write Now';
  btn.className = 'challenge-btn secondary';
  btn.onclick = () => {
    document.getElementById('setting').value = 'A clock that counts down to something other than time';
    openOverlay();
  };
}

function openOverlay() {
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

function submitGeneration(e) {
  e.preventDefault();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="ink-loader"></span> Generating…';

  setTimeout(() => {
    const genre = document.getElementById('genre').value;
    const characters = document.getElementById('characters').value;
    const setting = document.getElementById('setting').value;

    const covers = [COVERS.clockmaker, COVERS.neon, COVERS.hollow, COVERS.starlight];
    const cover = covers[Math.floor(Math.random() * covers.length)];
    const id = 'book-' + Date.now();
    const newBook = {
      id,
      title: `The ${genre} Chronicle`,
      shortTitle: `${genre}`,
      genre,
      coverImageUrl: cover,
      pages: [
        `In the world of ${setting}, ${characters} found themselves at the crossroads of destiny. The air hummed with possibility, and the stars seemed to lean closer to listen.\n\nThis is where your story begins...`,
        `The journey continued through valleys of shadow and peaks of light. Every step revealed new mysteries, and every silence held its own kind of music.`,
        `And so, beneath the ancient sky, the tale wove itself into the fabric of time—never truly ending, only waiting to be told again.`
      ],
      createdAt: new Date().toISOString(),
    };

    // Assign a spine color
    const hue = Math.floor(Math.random() * 360);
    SPINE_COLORS[id] = {
      bg: `hsl(${hue}, 25%, 18%)`,
      accent: `hsl(${hue}, 50%, 55%)`,
      title: `hsl(${hue}, 30%, 75%)`
    };

    books.push(newBook);
    selectedBookId = newBook.id;
    currentPage = 0;
    renderBookshelf();
    renderBook(true);

    setTimeout(() => {
      const scroll = document.getElementById('bookshelfScroll');
      scroll.scrollTop = scroll.scrollHeight;
    }, 100);

    document.getElementById('overlay').classList.remove('open');
    btn.disabled = false;
    btn.textContent = 'Generate';
    e.target.reset();
  }, 2000);
}
